# Traditional GPU mapping for full dense attention over the entire context.
# Pairs with: archs/traditional.yaml + prob_dense.yaml

mapping:
  nodes:
  - !Sequential
    nodes:
    - !Nested
      nodes:
      - !Storage
        component: Trad_DRAM_Storage
        tensors: [Query, DenseKey, DenseScore]
      - !Compute
        einsum: DenseQKT
        component: Trad_TPU_Compute

    - !Nested
      nodes:
      - !Storage
        component: Trad_DRAM_Storage
        tensors: [DenseScore, DenseValue, DenseOutput]
      - !Compute
        einsum: DenseSV
        component: Trad_TPU_Compute
