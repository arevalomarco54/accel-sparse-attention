# Traditional GPU baseline — models an H100-class accelerator doing full dense
# attention over the entire context, without DReX PIM assistance.
#
# HBM specs match longsight.yaml's GPU tier (same hardware, same cost model):
#   - 80 GB HBM3, 3.35 TB/s, 7 pJ/access (Table II, Quinn et al. MICRO'25)
#   - Compute: 0.10 pJ/op at 1.4 GHz (matching SM_Compute)
#
# Simplification: no on-chip L2 cache or shared memory is modeled. All data
# comes from DRAM on every access. This overestimates memory energy for the
# traditional baseline, making the comparison conservative (favorable to
# traditional). A real H100 would benefit from 50 MB L2 and SM shared memory.

arch:
  nodes:
  - !Memory
    name: Trad_DRAM_Storage
    size: 80 * 1024 * 1024 * 1024 * 8
    total_latency: max(read_latency, write_latency)
    leak_power: 0
    area: 0
    actions:
    - {name: read, energy: 7.0e-12, latency: 1 / (16 * 3350e9)}
    - {name: write, energy: 7.0e-12, latency: 1 / (16 * 3350e9)}
    tensors: {keep: All}

  - !Compute
    name: Trad_TPU_Compute
    leak_power: 0
    area: 1.0e-6
    actions:
    - {name: compute, energy: 0.10e-12, latency: 1 / 1.4e9}
    enabled: true
