# Dense-only attention workload for traditional GPU baseline comparison.
# Full 128K context (131072 tokens) attended densely — no sparse filtering.
# This is the workload a standard H100 must execute when it lacks DReX PIM.
# Compare energy/latency of this (on traditional arch) vs. prob.yaml (on LongSight).

workload:
  rank_sizes:
    H: 8
    W: 131072
    D: 128

  bits_per_value: {All: 16}

  einsums:
  - name: DenseQKT
    tensor_accesses:
    - {name: Query, projection: [h, d], bits_per_value: 16}
    - {name: DenseKey, projection: [h, w, d], bits_per_value: 16}
    - {name: DenseScore, projection: [h, w], bits_per_value: 16, output: True}

  - name: DenseSV
    tensor_accesses:
    - {name: DenseScore, projection: [h, w], bits_per_value: 16}
    - {name: DenseValue, projection: [h, w, d], bits_per_value: 16}
    - {name: DenseOutput, projection: [h, d], bits_per_value: 16, output: True}
