# LongSight decode-stage workload in valid AccelForge schema.

workload:
  rank_sizes:
    H: 8
    W: 1024
    D: 128
    K: 128
    K_s: 26214

  bits_per_value: {All: 16}

  einsums:
  - name: DenseQKT
    tensor_accesses:
    - {name: Query, projection: [h, d], bits_per_value: 16}
    - {name: DenseKey, projection: [h, w, d], bits_per_value: 16}
    - {name: DenseScore, projection: [h, w], bits_per_value: 16, output: True}

  - name: DenseSV
    tensor_accesses:
    - {name: DenseScore, projection: [h, w], bits_per_value: 16}
    - {name: DenseValue, projection: [h, w, d], bits_per_value: 16}
    - {name: DenseOutput, projection: [h, d], bits_per_value: 16, output: True}

  - name: SCF_Filter
    tensor_accesses:
    - {name: QuerySign, projection: [d], bits_per_value: 1}
    - {name: KeySign, projection: [k, d], bits_per_value: 1}
    - {name: Concordance, projection: [k], bits_per_value: 8, output: True}

  - name: SparseScore
    tensor_accesses:
    - {name: SparseQuery, projection: [d], bits_per_value: 16}
    - {name: FilteredKey, projection: {K_s: k_s, D: d}, bits_per_value: 16}
    - {name: SimScore, projection: {K_s: k_s}, bits_per_value: 32, output: True}
