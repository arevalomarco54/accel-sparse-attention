# LongSight-inspired architecture in valid AccelForge schema.

arch:
  nodes:
  - !Memory
    name: HBM_Storage
    size: 80 * 1024 * 1024 * 1024 * 8
    leak_power: 0
    area: 0
    actions:
    - {name: read, energy: 7.0e-12, latency: 1 / (16 * 3350e9)}
    - {name: write, energy: 7.0e-12, latency: 1 / (16 * 3350e9)}
    tensors: {keep: Query | DenseKey | DenseScore | DenseValue | DenseOutput}

  # Optional dense-attention branch on GPU SM compute.
  - !Fork
    nodes:
    - !Compute
      name: SM_Compute
      leak_power: 0
      area: 1.0e-6
      actions:
      - {name: compute, energy: 0.10e-12, latency: 1 / 1.4e9}
      enabled: len(DenseKey) > 0 or len(DenseValue) > 0

  # Main branch continues toward near-memory compute.
  - !Memory
    name: Bank_Storage
    size: 512 * 1024 * 1024 * 1024 * 8
    leak_power: 0
    area: 0
    actions:
    - {name: read, energy: 9.0e-12, latency: 1 / (16 * 136e9)}
    - {name: write, energy: 9.0e-12, latency: 1 / (16 * 136e9)}
    tensors: {keep: QuerySign | KeySign | Concordance | FilteredKey | SimScore}

  # Optional PFU branch for sign-concordance filtering.
  - !Fork
    nodes:
    - !Compute
      name: PFU_Compute
      leak_power: 0
      area: 5.0e-7
      actions:
      - {name: compute, energy: 0.02e-12, latency: 1 / 1.0e9}
      enabled: len(KeySign) > 0

  - !Memory
    name: Query_SPM_Storage
    size: 256 * 128 * 16
    leak_power: 0
    area: 1.0e-7
    actions:
    - {name: read, energy: 0.5e-12, latency: 1 / 1.0e9}
    - {name: write, energy: 0.5e-12, latency: 1 / 1.0e9}
    tensors: {keep: SparseQuery}

  - !Compute
    name: NMA_MAC_Compute
    leak_power: 0
    area: 8.0e-7
    actions:
    - {name: compute, energy: 0.05e-12, latency: 1 / 1.0e9}
    enabled: len(SparseQuery) > 0
